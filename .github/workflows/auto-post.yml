name: Auto Post Soal Matematika CPNS/TKA/SNBT

on:
  schedule:
    - cron: "0 0,2,5,8,11,13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync to latest main
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Run auto post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json self_learning/learning_config.json 2>/dev/null || true
          git stash
          git fetch origin
          git reset --hard origin/main
          git stash pop || true
          git add data/*.json self_learning/learning_config.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update data [skip ci]"
          git push
